<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>처방전 확인 - QRDoc</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="bg-surface flex items-center justify-between px-md w-full h-14 border-b border-outline-variant sticky top-0 z-50">
<button aria-label="Go back" class="p-2 -ml-2 rounded-full hover:bg-surface-container-low transition-colors text-primary flex items-center justify-center min-h-[48px] min-w-[48px]">
<span aria-hidden="true" class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary text-center flex-1">처방전 확인</h1>
<div class="w-12 h-12"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-container-max mx-auto px-md py-lg md:py-xl flex flex-col gap-xl">
<!-- Info/Context Banner -->
<section class="bg-primary-container/10 border border-primary-container/20 rounded-xl p-md flex items-start gap-sm shadow-[0_4px_15px_-3px_rgba(26,86,219,0.04)]">
<span aria-hidden="true" class="material-symbols-outlined text-primary mt-1" data-icon="auto_awesome" data-weight="fill" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<div>
<h2 class="font-label-lg text-label-lg text-on-background mb-1">AI 추출 정보</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Gemini AI가 스캔된 문서에서 다음 정보를 추출했습니다. 저장하기 전에 내용을 확인해주세요.</p>
</div>
</section>
<!-- Form Section -->
<section class="flex flex-col gap-lg">
<form class="flex flex-col gap-md">
<!-- Input Group: Drug Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-background ml-1" for="drugName">약물명</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span aria-hidden="true" class="material-symbols-outlined text-outline" data-icon="medication">medication</span>
</div>
<input aria-required="true" class="w-full bg-surface-container-lowest border-2 border-outline-variant rounded-lg py-sm pl-10 pr-sm font-body-lg text-body-lg text-on-background focus:border-primary focus:ring-0 focus:outline-none transition-colors min-h-[48px]" id="drugName" name="drugName" type="text" value="Amoxicillin"/>
</div>
</div>
<!-- Bento Grid for Dosage & Frequency -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Input Group: Dosage -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-background ml-1" for="dosage">용량</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span aria-hidden="true" class="material-symbols-outlined text-outline" data-icon="scale">scale</span>
</div>
<input aria-required="true" class="w-full bg-surface-container-lowest border-2 border-outline-variant rounded-lg py-sm pl-10 pr-sm font-body-lg text-body-lg text-on-background focus:border-primary focus:ring-0 focus:outline-none transition-colors min-h-[48px]" id="dosage" name="dosage" type="text" value="500mg"/>
</div>
</div>
<!-- Input Group: Frequency -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-background ml-1" for="frequency">복용 횟수</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span aria-hidden="true" class="material-symbols-outlined text-outline" data-icon="schedule">schedule</span>
</div>
<input aria-required="true" class="w-full bg-surface-container-lowest border-2 border-outline-variant rounded-lg py-sm pl-10 pr-sm font-body-lg text-body-lg text-on-background focus:border-primary focus:ring-0 focus:outline-none transition-colors min-h-[48px]" id="frequency" name="frequency" type="text" value="하루 3회"/>
</div>
</div>
</div>
<!-- Input Group: Duration -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-background ml-1" for="duration">복용 기간</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span aria-hidden="true" class="material-symbols-outlined text-outline" data-icon="calendar_today">calendar_today</span>
</div>
<input aria-required="true" class="w-full bg-surface-container-lowest border-2 border-outline-variant rounded-lg py-sm pl-10 pr-sm font-body-lg text-body-lg text-on-background focus:border-primary focus:ring-0 focus:outline-none transition-colors min-h-[48px]" id="duration" name="duration" type="text" value="7일"/>
</div>
</div>
</form>
</section>
<!-- Actions -->
<div class="mt-auto pt-lg pb-xl w-full flex flex-col gap-sm">
<button class="w-full bg-primary-container text-on-primary-container font-label-lg text-label-lg rounded-full min-h-[56px] flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-sm" type="button">
<span aria-hidden="true" class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                확인 및 저장
            </button>
<button class="w-full bg-transparent text-primary font-label-lg text-label-lg rounded-full min-h-[48px] flex items-center justify-center hover:bg-surface-container-low transition-colors" type="button">
                직접 수정하기
            </button>
</div>
</main>
</body></html>
